name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  # ── Unit Tests (no LocalStack needed) ────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ── Integration Tests (spins up LocalStack) ──────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -e DEBUG=0 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            localstack/localstack:3.7
          echo "Container started, waiting for health..."

      - name: Wait for LocalStack to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready!"
              curl -s http://localhost:4566/_localstack/health | head -c 200
              exit 0
            fi
            echo "  attempt $i/40..."
            sleep 5
          done
          echo "LocalStack failed to start. Container logs:"
          docker logs localstack
          exit 1

      - name: Run integration tests
        run: npm run test:integration
        env:
          LS_ENDPOINT: http://localhost:4566
          LS_REGION: us-east-1
          LS_ACCESS_KEY: test
          LS_SECRET_KEY: test

      - name: Print LocalStack logs on failure
        if: failure()
        run: docker logs localstack 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f localstack 2>/dev/null || true
